<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WITHER STORM PROJECT</title>

<style>
body {
    background-color: #0a0a0a;
    color: lime;
    font-family: monospace;
    text-align: center;
}

h1 {
    font-size: 45px;
    margin-top: 40px;
}

p {
    font-size: 18px;
}

.box {
    border: 2px solid lime;
    padding: 20px;
    margin: 20px;
    display: inline-block;
    background-color: rgba(0, 255, 0, 0.05);
}

/* EFECTO GLITCH */
.glitch {
    position: relative;
    color: lime;
    animation: glitch 0.5s infinite;
}

.glitch::before,
.glitch::after {
    content: "WITHER STORM PROJECT";
    position: absolute;
    left: 0;
    width: 100%;
}

.glitch::before {
    color: red;
    animation: glitchTop 0.5s infinite;
}

.glitch::after {
    color: blue;
    animation: glitchBottom 0.5s infinite;
}

@keyframes glitch {
    0% { transform: none; }
    20% { transform: skew(-2deg); }
    40% { transform: skew(2deg); }
    60% { transform: none; }
    80% { transform: skew(1deg); }
    100% { transform: none; }
}

@keyframes glitchTop {
    0% { clip-path: inset(0 0 50% 0); transform: translate(-2px,-2px); }
    50% { clip-path: inset(0 0 50% 0); transform: translate(2px,2px); }
    100% { clip-path: inset(0 0 50% 0); transform: translate(-2px,-2px); }
}

@keyframes glitchBottom {
    0% { clip-path: inset(50% 0 0 0); transform: translate(2px,2px); }
    50% { clip-path: inset(50% 0 0 0); transform: translate(-2px,-2px); }
    100% { clip-path: inset(50% 0 0 0); transform: translate(2px,2px); }
}
</style>
</head>

<body>

<h1 class="glitch">WITHER STORM PROJECT</h1>

<div class="box">
    <p>Phase Development Versions</p>
    <p>v0.1 - v0.6.3</p>
</div>

<div class="box">
    <p>Corrupted Experiments</p>
    <p>Classified Files</p>
</div>

<p>Created by Evan Ommar</p>

</body>
</html>
