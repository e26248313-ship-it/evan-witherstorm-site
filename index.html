<!DOCTYPE html>

<head>

<title>Void Dominion</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow-x:hidden;
}

/* fondo animado */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center,#320032,#000000);
z-index:-1;
animation:pulse 4s infinite alternate;
}

@keyframes pulse{
from{opacity:0.8;}
to{opacity:1;}
}

/* titulo glitch */

.glitch{
font-size:3em;
font-weight:bold;
position:relative;
display:inline-block;
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 2px red,-2px -2px blue;}
25%{text-shadow:-2px 2px red,2px -2px blue;}
50%{text-shadow:2px -2px red,-2px 2px blue;}
75%{text-shadow:-2px -2px red,2px 2px blue;}
100%{text-shadow:2px 2px red,-2px -2px blue;}
}

/* contenedor */

.container{
margin-top:120px;
}

/* botones */

.btn{
display:block;
width:260px;
margin:15px auto;
padding:15px;
font-size:18px;
color:white;
background:linear-gradient(45deg,purple,magenta);
border-radius:10px;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
background:linear-gradient(45deg,magenta,purple);
}

/* botones secundarios */

.btn2{
background:#00aa00;
}

.btn2:hover{
background:#00ff00;
}

.btn3{
background:#5865F2;
}

.btn3:hover{
background:#7289da;
}

</style>

</head>

<body>

<div class="container">

<h1 class="glitch">VOID DOMINION</h1>
